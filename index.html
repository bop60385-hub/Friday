<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friday – AI Personal Intelligence Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <div class="logo" aria-hidden="true">F</div>
      <div class="header-title">
        <h1>Friday</h1>
        <p>AI Personal Intelligence Assistant</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="mute-btn" class="icon-btn" title="Mute Friday" aria-label="Mute Friday">
        <span class="icon" aria-hidden="true">🔊</span>
        <span>Mute</span>
      </button>
      <button id="settings-btn" class="icon-btn" title="Open Settings" aria-label="Open Settings">
        <span class="icon" aria-hidden="true">⚙️</span>
        <span>Settings</span>
      </button>
    </div>
  </header>

  <!-- ── Chat window ───────────────────────────────────────────────── -->
  <main id="chat-messages" role="log" aria-live="polite" aria-label="Conversation with Friday"></main>

  <!-- ── Input bar ─────────────────────────────────────────────────── -->
  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Ask Friday anything…"
      aria-label="Your message"
    ></textarea>
    <button id="send-btn" aria-label="Send message">Send</button>
  </div>

  <!-- ── Settings panel ────────────────────────────────────────────── -->
  <div id="settings-panel" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-backdrop" aria-hidden="true"></div>
    <div class="settings-drawer">

      <div class="settings-header">
        <h2>⚙️ Settings</h2>
        <button id="close-settings" class="close-btn" aria-label="Close settings">✕</button>
      </div>

      <!-- Voice settings -->
      <section class="settings-section">
        <h3>Voice</h3>

        <div class="settings-row">
          <label for="voice-select">Voice</label>
          <select id="voice-select" aria-label="Select voice">
            <option value="">Auto (British female preferred)</option>
          </select>
        </div>

        <div class="toggle-row">
          <label for="auto-speak">Auto-speak responses</label>
          <label class="toggle">
            <input type="checkbox" id="auto-speak" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <p class="settings-hint">
          Friday prefers a British female voice (Google UK English Female,
          Microsoft Sonia, Microsoft Libby, or similar). If unavailable it
          falls back to any English voice. Choosing a voice here overrides
          the automatic selection.
        </p>
      </section>

    </div>
  </div>

  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
